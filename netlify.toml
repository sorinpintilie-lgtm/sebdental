[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Safety redirect: when publishing `.next` directly, static assets live under `/static/*`
# while HTML references `/_next/static/*`.
[[redirects]]
  from = "/_next/static/*"
  to = "/static/:splat"
  status = 200
  force = true

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
